<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GigAtende</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="popup-raiz" id="raizPopup">

    <!-- Cabeçalho -->
    <header class="cabecalho">
      <div class="cabecalho__logo">
        <img src="../../../assets/icon128.png" class="icone-svg" alt="GigAtende Logo" />
        <div class="cabecalho__titulo">
          <span class="marca-nome">GigAtende</span>
          <span class="marca-subtitulo">Assistente de Atendimento</span>
        </div>
      </div>
    </header>

    <!-- Cartão do Domínio -->
    <div class="cartao-dominio">
      <div class="dominio__info">
        <svg class="icone-dominio" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
            fill="currentColor" />
        </svg>
        <span class="texto-dominio" id="textoDominio">Carregando…</span>
      </div>
      <div class="badge-status" id="badgeStatus">
        <span class="ponto-status" id="pontoStatus"></span>
        <span id="rotuloStatus">Desativado</span>
      </div>
    </div>

    <!-- Chave de Ativação -->
    <div class="linha-ativacao">
      <div class="rotulo-ativacao">
        <svg viewBox="0 0 24 24" class="icone-pequeno" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"
            fill="currentColor" />
        </svg>
        <span>Ativar neste site</span>
      </div>
      <label class="interruptor" aria-label="Ativar extensão neste site">
        <input type="checkbox" id="alternarSite" />
        <span class="deslizador"></span>
      </label>
    </div>

    <!-- Seleção de Campo -->
    <div class="divisor-secao"></div>
    <div class="secao-campo" id="secaoCampo">
      <div class="status-campo" id="statusCampo">
        <svg viewBox="0 0 24 24" class="icone-pequeno icone-campo" id="iconeCampo" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"
            fill="currentColor" />
        </svg>
        <span id="textoStatusCampo">Informações do site</span>
      </div>
      <button class="botao botao-contorno botao-pequeno" id="btnSelecionarInfo"
        title="Selecionar informações na tela (placeholders)">
        <svg viewBox="0 0 24 24" class="icone-extra-pequeno" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
            fill="currentColor" />
        </svg>
        <span>Selecionar informações</span>
      </button>
    </div>

    <!-- Ações Rápidas -->
    <div class="divisor-secao"></div>
    <div class="acoes-rapidas">
      <button class="botao botao-primario botao-bloco" id="btnAdmin">
        <svg viewBox="0 0 24 24" class="icone-pequeno" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
            fill="currentColor" />
        </svg>
        Abrir Administração
      </button>
    </div>

    <!-- Aviso de Modo de Seleção -->
    <div class="aviso-selecao" id="avisoSelecao" style="display:none">
      <svg viewBox="0 0 24 24" class="icone-giratorio" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"
          fill="currentColor" />
      </svg>
      <div>
        <strong>Modo seleção ativo</strong>
        <p>Clique em qualquer elemento de texto da tela para mapear uma informação para armazenar em uma variável</p>
      </div>
      <button class="botao-cancelar-selecao" id="btnCancelarSelecao" title="Cancelar seleção">
        <svg viewBox="0 0 24 24" class="icone-extra-pequeno" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"
            fill="currentColor" />
        </svg>
      </button>
    </div>

    <!-- Rodapé -->
    <footer class="rodape-popup">
      <span>GigAtende v1.3.0</span>
      <span class="aviso-atualizacao" id="avisoAtualizacao" style="display:none"></span>
    </footer>
  </div>

  <script src="../../servicos/armazenamento.js"></script>
  <script src="popup.js"></script>
</body>

</html>
